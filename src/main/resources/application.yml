spring:
  application:
    name: ai-code-backend
  datasource:
    url: jdbc:mysql://localhost:3306/ai_code?serverTimezone=UTC&characterEncoding=utf8&useUnicode=true&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
server:
  port: 8123
  servlet:
    context-path: /api

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.ai.code.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
